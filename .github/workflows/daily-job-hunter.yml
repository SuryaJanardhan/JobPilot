name: Daily Job Hunter (10 Aligned Jobs)

on:
  schedule:
    # 5:00 AM IST = 11:30 PM UTC previous day
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  job-hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web-job-hunter/package-lock.json

      - name: Install dependencies
        run: |
          cd web-job-hunter
          npm install --no-save

      - name: Create service account JSON file
        run: |
          cat > seismic-rarity-468405-j1-cd12fe29c298.json << 'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Create .env file
        run: |
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" > web-job-hunter/.env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> web-job-hunter/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> web-job-hunter/.env
          echo "JOB_SHEET_LINK=https://docs.google.com/spreadsheets/d/1DvNSIB_M9yMx6u3Fh2wzdzRpZ_toJmaIwfrelnwP6Ts/edit?gid=0#gid=0" >> web-job-hunter/.env
          echo "TARGET_JOBS=10" >> web-job-hunter/.env
          echo "MAX_RUN_MINUTES=120" >> web-job-hunter/.env

      - name: Run daily job hunter
        run: |
          cd web-job-hunter
          node index.js
